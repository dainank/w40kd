# Configuration for auto-setup.ps1
#
# If provided, values here will be used instead of prompting at runtime.
# Leave a key empty or remove it to force an interactive prompt.

# Path to your Steam installation (must end in \Steam)
# Example: C:\Program Files (x86)\Steam
SteamRoot=

# CPU architecture to use when selecting DirectStorage binaries.
# Allowed values: x64 | x86 | ARM64
Architecture=

# Configuration version to copy to Darktide.
# Current supported value: v4
ConfigVersion=v4
